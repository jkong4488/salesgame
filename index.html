/* ============================= STORAGE (Supabase) ============================= */
var supabaseClient = null;
function supabaseConfigured(){
  return SUPABASE_URL.indexOf("YOUR_SUPABASE")===-1 && SUPABASE_ANON_KEY.indexOf("YOUR_SUPABASE")===-1;
}
function getSupabaseClient(){
  if(supabaseClient) return supabaseClient;
  if(typeof supabase === "undefined" || !supabaseConfigured()) return null;
  try{ supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); return supabaseClient; }
  catch(e){ return null; }
}
async function sset(key, val){
  var client = getSupabaseClient();
  if(!client) return null;
  try{
    var res = await client.from("quiz_data").upsert({ key:key, value:val, updated_at:new Date().toISOString() }, { onConflict:"key" });
    if(res.error){ console.error("supabase set failed", key, res.error); return null; }
    return { key:key, value:val };
  }catch(e){ console.error("supabase set failed", key, e); return null; }
}
async function sget(key){
  var client = getSupabaseClient();
  if(!client) return null;
  try{
    var res = await client.from("quiz_data").select("value").eq("key", key).maybeSingle();
    if(res.error || !res.data) return null;
    return res.data.value;
  }catch(e){ return null; }
}
async function slist(prefix){
  var client = getSupabaseClient();
  if(!client) return [];
  try{
    var res = await client.from("quiz_data").select("key").like("key", prefix+"%");
    if(res.error || !res.data) return [];
    return res.data.map(function(row){ return row.key; });
  }catch(e){ return []; }
}

/* ============================= SCORING ============================= */
function computePoints(correct, tookMs, durationMs){
  if(!correct) return 0;
  var frac = Math.max(0, Math.min(1, 1 - tookMs/durationMs));
  return Math.round(500 + 500*frac);
}
function normalizeText(s){
  return String(s).toLowerCase().trim().replace(/[^a-z0-9 ]/g,"").replace(/\s+/g," ").trim();
}
function isTextCorrect(q, answer){
  var norm = normalizeText(answer);
  if(!norm) return false;
  for(var i=0;i<q.accepted.length;i++){
    if(normalizeText(q.accepted[i])===norm) return true;
  }
  return false;
}

var NOTE_FREQ = {
  G3:196.00, A3:220.00, B3:246.94,
  C4:261.63, D4:293.66, E4:329.63, F4:349.23, G4:392.00, A4:440.00, B4:493.88,
  C5:523.25, D5:587.33, E5:659.25, F5:698.46, G5:783.99, A5:880.00, B5:987.77,
  C6:1046.50
};
var LOBBY_MELODY = ["C4","E4","G4","E4"];
var QUESTION_MELODY = ["C4","D4","E4","G4","E4","D4","C4","G3"];
var VICTORY_MELODY = ["C5","C5","C5","G5","A5","G5","E5","G5","A5","C6"];
var CORRECT_STING = ["C5","E5","G5","C6"];
var WRONG_STING = ["A4","G4","F4"];

var audioCtx = null;
var musicEnabled = true;
var loopToken = 0;
var currentLoopTimer = null;
var musicUrgentActive = false;

function ensureAudioCtx(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ audioCtx = null; }
  }
  if(audioCtx && audioCtx.state==="suspended"){ audioCtx.resume(); }
  return audioCtx;
}
function playNote(freq, startTime, duration, type, volume){
  var ctx = ensureAudioCtx();
  if(!ctx) return;
  var osc = ctx.createOscillator();
  var gain = ctx.createGain();
  osc.type = type || "sine";
  osc.frequency.setValueAtTime(freq, startTime);
  var attack = Math.min(0.02, duration*0.3);
  var release = Math.min(0.05, duration*0.3);
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(volume, startTime+attack);
  gain.gain.setValueAtTime(volume, Math.max(startTime+attack, startTime+duration-release));
  gain.gain.linearRampToValueAtTime(0, startTime+duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(startTime);
  osc.stop(startTime+duration+0.02);
}
function stopMusic(){
  loopToken++;
  if(currentLoopTimer){ clearTimeout(currentLoopTimer); currentLoopTimer=null; }
}
function playMelody(notes, noteDuration, type, volume, loop){
  stopMusic();
  if(!musicEnabled) return;
  var myToken = loopToken;
  function cycle(){
    if(myToken!==loopToken || !musicEnabled) return;
    var ctx = ensureAudioCtx();
    if(!ctx) return;
    var startTime = ctx.currentTime+0.03;
    notes.forEach(function(n,i){ playNote(NOTE_FREQ[n], startTime+i*noteDuration, noteDuration*0.85, type, volume); });
    if(loop){ currentLoopTimer = setTimeout(cycle, notes.length*noteDuration*1000); }
  }
  cycle();
}
function toggleMute(){
  musicEnabled = !musicEnabled;
  document.getElementById("muteBtn").innerHTML = musicEnabled ? "&#128266;" : "&#128263;";
  if(!musicEnabled){ stopMusic(); }
}

  await sset("quiz:"+code+":meta", { phase:"lobby", currentQ:-1, phaseStartedAt:Date.now(), durationMs:S.durationMs });

async function hostRefreshRoster(){
  var keys = await slist("quiz:"+S.code+":player:");
  var roster = {};
  for(var i=0;i<keys.length;i++){
    var v = await sget(keys[i]);
    if(v){ var id = keys[i].split(":").pop(); roster[id]=v.name; }
  }
  var changed = JSON.stringify(roster) !== JSON.stringify(S.players);
  S.players = roster;
  if(changed && S.screen==="hostLobby") render();

async function hostStart(){
  if(Object.keys(S.players).length===0) return;

}
async function hostAdvanceQuestion(idx){
  clearTimers();
  if(idx >= QUESTIONS.length){ await hostFinal(); return; }
  S.currentQ = idx; S.answeredCount = 0; S.answeredIds = {};
  S.durationMs = (QUESTIONS[idx].seconds || QUESTION_SECONDS) * 1000;
  var startedAt = Date.now();
  await sset("quiz:"+S.code+":meta", { phase:"question", currentQ:idx, phaseStartedAt:startedAt, durationMs:S.durationMs });
  S.phaseStartedAt = startedAt;
  S.screen = "hostQuestion";
  render();
  musicUrgentActive = false;
  playMelody(QUESTION_MELODY, 0.22, "triangle", 0.05, true);
  pollT = setInterval(hostPollAnswerCount, 1500);
  tickT = setInterval(hostTick, 200);
}
async function hostPollAnswerCount(){
  var keys = await slist("quiz:"+S.code+":answer:"+S.currentQ+":");
  var idsObj = {};
  for(var i=0;i<keys.length;i++){
    var id = keys[i].split(":").pop();
    idsObj[id] = true;
  }
  var changed = JSON.stringify(Object.keys(idsObj).sort()) !== JSON.stringify(Object.keys(S.answeredIds).sort());
  if(changed){
    S.answeredCount = keys.length;
    S.answeredIds = idsObj;
    if(S.screen==="hostQuestion") render();
  }
}
function updateTimerBar(elapsed){
  var remain = Math.max(0, S.durationMs-elapsed);
  var pct = Math.max(0, 100*remain/S.durationMs);
  var bar = document.querySelector(".timerBar");
  if(bar){
    bar.style.width = pct + "%";
    bar.classList.toggle("urgent", remain<5000);
  }
  if(remain<5000 && !musicUrgentActive && (S.role==="host" || S.role==="solo")){
    musicUrgentActive = true;
    playMelody(QUESTION_MELODY, 0.13, "triangle", 0.06, true);
  }
}
function hostTick(){
  if(S.screen!=="hostQuestion") return;
  var elapsed = Date.now()-S.phaseStartedAt;
  if(elapsed >= S.durationMs){ hostReveal(); return; }
  updateTimerBar(elapsed);
}
async function hostReveal(){
  clearTimers();
  stopMusic();
  await sset("quiz:"+S.code+":meta", { phase:"reveal", currentQ:S.currentQ, phaseStartedAt:S.phaseStartedAt, durationMs:S.durationMs });
  var q = QUESTIONS[S.currentQ];
  var counts=[0,0,0,0];
  var textAnswers=[];
  for(var id in S.players){
    var a = await sget("quiz:"+S.code+":answer:"+S.currentQ+":"+id);
    if(a){
      if(q.type==="mc"){ counts[a.choice]=(counts[a.choice]||0)+1; }
      else { textAnswers.push({ name:S.players[id], answer:a.rawAnswer, correct:a.correct }); }
      S.scores[id] = { name:S.players[id], score:a.cumulativeScore, correct:(typeof a.cumulativeCorrect==="number"?a.cumulativeCorrect:0) };
    } else if(!S.scores[id]){
      S.scores[id] = { name:S.players[id], score:0, correct:0 };
    }
  }
  S.revealCounts = counts;
  S.revealTextAnswers = textAnswers;
  S.screen = "hostReveal";
  render();
}

function goJoinForm(){ clearTimers(); S.screen="joinForm"; S.joinError=""; render(); }
async function playerJoin(codeVal, nameVal){
  var code = (codeVal||"").trim();
  var typedName = (nameVal||"").trim();
  if(!code){ S.joinError="Enter a game code."; render(); return; }
  var meta = await sget("quiz:"+code+":meta");
  if(!meta){ S.joinError="No game found with that code."; render(); return; }
  S = freshState();
  S.code=code; S.role="player";
  var saved = getSavedSession(code);
  if(saved && saved.playerId){
    S.playerId = saved.playerId;
    S.playerName = typedName || saved.name;
    var progress = await recoverProgress(code, S.playerId, meta.currentQ);
    S.myScore = progress.score;
    S.myCorrectCount = progress.correct;
  } else {
    S.playerId = randId();
    S.playerName = typedName || "Player";
  }
  await sset("quiz:"+code+":player:"+S.playerId, { name:S.playerName });
  saveSession(code, S.playerId, S.playerName);
  applyMeta(meta);
  render();
  pollT = setInterval(playerPoll, 1500);
}
function applyMeta(meta){
  var qChanged = meta.currentQ !== S.currentQ;
  var phaseChanged = meta.phase !== S.phase;
  if(!qChanged && !phaseChanged) return false;

  if(meta.phase==="lobby"){
    S.phase="lobby"; S.currentQ=meta.currentQ; S.screen="playerWaiting";
  } else if(meta.phase==="question"){
    var isNewQuestion = meta.currentQ !== S.currentQ || S.screen!=="playerQuestion";
    S.phase="question"; S.currentQ=meta.currentQ; S.phaseStartedAt=meta.phaseStartedAt; S.durationMs=meta.durationMs;
    if(isNewQuestion){ S.selected=null; }
    S.screen="playerQuestion";
    if(tickT) clearInterval(tickT);
    tickT = setInterval(function(){
      if(S.screen!=="playerQuestion") return;
      updateTimerBar(Date.now()-S.phaseStartedAt);
    }, 200);
  } else if(meta.phase==="reveal"){
    if(S.screen==="playerQuestion" && S.selected===null){ S.myLast = { correct:false, points:0 }; }
    S.phase="reveal"; S.currentQ=meta.currentQ;
    S.screen="playerReveal";
    if(S.myLast){ playMelody(S.myLast.correct ? CORRECT_STING : WRONG_STING, 0.12, S.myLast.correct ? "triangle" : "sine", 0.06, false); }
  } else if(meta.phase==="leaderboard"){
    S.phase="leaderboard"; S.currentQ=meta.currentQ;
    S.screen="playerLeaderboard";
  } else if(meta.phase==="final"){
    S.phase="final"; S.currentQ=meta.currentQ;
    S.screen="playerFinal";
  }
  return true;
}
async function playerPoll(){
  var meta = await sget("quiz:"+S.code+":meta");
  if(!meta) return;
  if(applyMeta(meta)) render();
}
async function playerAnswer(choiceIdx){
  if(S.selected!==null) return;
  S.selected = choiceIdx;
  var tookMs = Math.min(S.durationMs, Date.now()-S.phaseStartedAt);
  var correct = choiceIdx === QUESTIONS[S.currentQ].correct;
  var points = computePoints(correct, tookMs, S.durationMs);
  S.myScore += points;
  if(correct) S.myCorrectCount += 1;
  S.myLast = { correct:correct, points:points };
  await sset("quiz:"+S.code+":answer:"+S.currentQ+":"+S.playerId, { choice:choiceIdx, correct:correct, points:points, cumulativeScore:S.myScore, cumulativeCorrect:S.myCorrectCount, tookMs:tookMs });
  S.screen = "playerAnswered";
  render();
}
async function playerSubmitText(){
  if(S.selected!==null) return;
  var input = document.getElementById("playerTextInput");
  var raw = input ? input.value.trim() : "";
  if(!raw) return;
  S.selected = raw;
  var tookMs = Math.min(S.durationMs, Date.now()-S.phaseStartedAt);
  var q = QUESTIONS[S.currentQ];
  var correct = isTextCorrect(q, raw);
  var points = computePoints(correct, tookMs, S.durationMs);
  S.myScore += points;
  if(correct) S.myCorrectCount += 1;
  S.myLast = { correct:correct, points:points };
  await sset("quiz:"+S.code+":answer:"+S.currentQ+":"+S.playerId, { rawAnswer:raw, correct:correct, points:points, cumulativeScore:S.myScore, cumulativeCorrect:S.myCorrectCount, tookMs:tookMs });
  S.screen = "playerAnswered";
  render();
}

function openQuestionList(){ clearTimers(); S.screen="editList"; render(); }
function openEditForm(i){
  S.editing = i;
  if(i===null){
    S.editDraft = { type:"mc", q:"", options:["","","",""], correct:0, accepted:"", seconds:QUESTION_SECONDS };
  } else {
    var src = QUESTIONS[i];
    S.editDraft = {
      type: src.type,
      q: src.q,
      options: src.type==="mc" ? src.options.slice() : ["","","",""],
      correct: src.type==="mc" ? src.correct : 0,
      accepted: src.type==="text" ? src.accepted.join(", ") : "",
      seconds: src.seconds || QUESTION_SECONDS
    };
  }
  S.screen = "editForm";
  render();
}
function setDraftQ(val){ S.editDraft.q = val; }
function setDraftOption(idx, val){ S.editDraft.options[idx] = val; }
function setDraftAccepted(val){ S.editDraft.accepted = val; }
function setDraftCorrect(idx){ S.editDraft.correct = idx; }
function setDraftSeconds(val){ S.editDraft.seconds = val; }
function setDraftType(el){ S.editDraft.type = el.dataset.type; render(); }
function saveDraft(){
  var d = S.editDraft;
  var q = (d.q||"").trim();
  if(!q) return;
  var secs = parseInt(d.seconds, 10);
  if(isNaN(secs) || secs<3) secs = QUESTION_SECONDS;
  if(secs>300) secs = 300;
  var newQ;
  if(d.type==="mc"){
    var opts = d.options.map(function(o){ return (o||"").trim(); });
    newQ = { type:"mc", q:q, options:opts, correct:d.correct, seconds:secs };
  } else {
    var accepted = (d.accepted||"").split(",").map(function(s){ return s.trim(); }).filter(function(s){ return s.length>0; });
    newQ = { type:"text", q:q, accepted: accepted.length ? accepted : [""], seconds:secs };
  }
  if(S.editing===null){ QUESTIONS.push(newQ); } else { QUESTIONS[S.editing] = newQ; }
  saveQuestionBank();
  S.screen = "editList";
  render();
}
function cancelEdit(){ S.screen="editList"; render(); }
function moveQuestion(i, dir){
  var j = i+dir;
  if(j<0 || j>=QUESTIONS.length) return;
  var tmp = QUESTIONS[i]; QUESTIONS[i]=QUESTIONS[j]; QUESTIONS[j]=tmp;
  saveQuestionBank();
  render();
}
function requestDelete(i){
  var btn = document.getElementById("del-"+i);
  if(!btn) return;
  if(btn.dataset.armed==="1"){
    QUESTIONS.splice(i,1);
    saveQuestionBank();
    render();
  } else {
    btn.textContent = "Confirm?";
    btn.dataset.armed = "1";
    setTimeout(function(){ if(btn && btn.dataset.armed==="1"){ btn.textContent="Delete"; btn.dataset.armed="0"; } }, 3000);
  }
}

/* ============================= RENDER HELPERS ============================= */
function esc(s){ return String(s).replace(/[&<>"']/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]; }); }

function optionsHtml(options, opts){
  opts = opts || {};
  var parts = options.map(function(o,i){
    var cls = "opt " + OPT_CLASS[i];
    if(opts.correctIdx!==undefined){
      if(i===opts.correctIdx) cls += " correct";
      else if(i===opts.selected) cls += " wrong";
    }
    var clickable = !!opts.onClick && opts.selected===undefined && opts.correctIdx===undefined;
    var clickAttr = clickable ? (' onclick="'+opts.onClick+'('+i+')"') : "";
    var cursorStyle = clickable ? "" : "cursor:default;";
    return '<div class="'+cls+'" style="'+cursorStyle+'"'+clickAttr+'>'+OPT_MARKS[i]+'&nbsp;&nbsp;'+esc(o)+'</div>';
  });
  return '<div class="grid2">' + parts.join("") + '</div>';
}
function renderScoreRows(sorted, totalAsked){
  return sorted.map(function(p,i){
    return '<div class="list-row"><span><span class="rank">#'+(i+1)+'</span> '+esc(p.name)+'</span><span><span class="muted" style="margin-right:10px;font-size:12px;">'+(p.correct||0)+'/'+totalAsked+' correct</span><b>'+p.score+'</b></span></div>';
  }).join("");
}
function renderConfetti(){
  var colors = ["var(--a)","var(--b)","var(--c)","var(--d)"];
  var pieces = "";
  for(var i=0;i<18;i++){
    var left = Math.round(Math.random()*100);
    var delay = (Math.random()*0.6).toFixed(2);
    var dur = (1.8+Math.random()*1.2).toFixed(2);
    var color = colors[i%colors.length];
    pieces += '<div class="confetti" style="left:'+left+'%;background:'+color+';animation-delay:'+delay+'s;animation-duration:'+dur+'s;"></div>';
  }
  return pieces;
}

        + '<div class="card" style="background:#0e1330;margin-top:16px;"><div class="kicker">Who picked what</div>'+rows+'</div>';
    } else {
      var acceptedStr = q.accepted.join(", ");
      var rows2 = S.revealTextAnswers.map(function(r){
        var mark = r.correct ? "\u2705" : "\u274C";
        return '<div class="list-row"><span>'+mark+' '+esc(r.name)+'</span><span class="muted">'+esc(r.answer)+'</span></div>';
      }).join("") || '<p class="muted">No one answered.</p>';
      body = '<p class="muted">Accepted: <b style="color:var(--text)">'+esc(acceptedStr)+'</b></p>'
        + '<div class="card" style="background:#0e1330;margin-top:12px;"><div class="kicker">What people typed</div>'+rows2+'</div>';
    }
    return '<div class="card">'
      + '<div class="kicker">Question '+(S.currentQ+1)+' of '+QUESTIONS.length+' &mdash; Answer</div>'
      + '<h2>'+esc(q.q)+'</h2>'
      + body
      + '<div style="margin-top:18px;"><button class="btn btn-primary" onclick="hostLeaderboard()">Show Leaderboard &rarr;</button></div>'
      + '</div>';
  },
  hostLeaderboard(){
    var sorted = [];
    for(var id in S.scores){ sorted.push(S.scores[id]); }
    sorted.sort(function(a,b){ return b.score-a.score; });
    var isLast = S.currentQ >= QUESTIONS.length-1;
    var rows = renderScoreRows(sorted, S.currentQ+1);
    return '<div class="card">'
      + '<div class="kicker">Leaderboard</div>'
      + '<h2>After Question '+(S.currentQ+1)+' of '+QUESTIONS.length+'</h2>'
      + (rows || '<p class="muted">No scores yet.</p>')
      + '<div style="margin-top:18px;"><button class="btn btn-primary" onclick="'+(isLast?"hostFinal":"hostNext")+'()">'+(isLast?"Final Results &rarr;":"Next Question &rarr;")+'</button></div>'
      + '</div>';
  },
  hostFinal(){
    var sorted = [];
    for(var id in S.scores){ sorted.push(S.scores[id]); }
    sorted.sort(function(a,b){ return b.score-a.score; });
    var top3 = sorted.slice(0,3);
    var podiumOrder = [1,0,2];
    var podiumHeights = [100,140,78];
    var podiumColors = ["var(--silver)","var(--gold)","var(--bronze)"];
    var medals = ["\uD83E\uDD48","\uD83E\uDD47","\uD83E\uDD49"];
    var podiumHtml = podiumOrder.map(function(idx,pos){
      var p = top3[idx];
      if(!p) return "<div></div>";
      return '<div><div style="font-size:24px;">'+medals[pos]+'</div>'
        + '<div class="bar" style="height:'+podiumHeights[pos]+'px;background:'+podiumColors[pos]+';"></div>'
        + '<div style="margin-top:6px;font-weight:700;font-size:13px;">'+esc(p.name)+'</div>'
        + '<div class="muted">'+p.score+'</div></div>';
    }).join("");
    var listHtml = renderScoreRows(sorted, S.currentQ+1);
    var awardHtml = top3[0] ? renderAward(top3[0].name) : '<p class="muted">No scores yet.</p>';
    return '<div class="card center">'
      + awardHtml
      + '<div class="podium">'+podiumHtml+'</div>'
      + '<div class="kicker" style="margin-top:8px;">Full standings</div>'
      + (listHtml || '<p class="muted">No scores yet.</p>')
      + '<div style="margin-top:18px;"><button class="btn btn-primary" onclick="resetToLanding()">New Game</button></div>'
      + '</div>';
  },
  joinForm(){
    var warning = (STORAGE_WORKING === false)
      ? '<div class="card" style="background:#2a1810;border-color:var(--bad);margin-bottom:14px;text-align:left;">'
        + '<p style="color:var(--text);margin:0;font-size:13px;"><b>Not connected to Supabase.</b> This won\u2019t be able to find any game right now.</p>'
        + '</div>'
      : '';
    return warning + '<div class="card">'
      + '<h2>Join a Game</h2>'
      + '<input type="text" id="joinCode" placeholder="Game PIN" maxlength="4" inputmode="numeric" value="'+esc(S.prefillCode||"")+'">'
      + '<input type="text" id="joinName" placeholder="Your name" maxlength="20">'
      + (S.joinError ? '<p style="color:var(--bad)">'+esc(S.joinError)+'</p>' : "")
      + '<button class="btn btn-primary" onclick="playerJoin(document.getElementById(\'joinCode\').value, document.getElementById(\'joinName\').value)">Join &rarr;</button>'
      + '<button class="btn btn-ghost" onclick="resetToLanding()">Back</button>'
      + '</div>';
  },
  playerWaiting(){
    return '<div class="card center">'
      + '<div class="kicker">You are in, '+esc(S.playerName)+'!</div>'
      + '<div class="pulse-dot"></div>'
      + '<h2>Waiting for the host to start&hellip;</h2>'
      + '<p class="muted">Keep this open &mdash; the question will appear automatically.</p>'
      + '</div>';
  },
  playerQuestion(){
    var q = QUESTIONS[S.currentQ];
    var elapsed = Date.now()-S.phaseStartedAt;
    var remain = Math.max(0, S.durationMs-elapsed);
    var pct = Math.max(0, 100*remain/S.durationMs);
    var urgent = remain<5000 ? " urgent" : "";
    var body = q.type==="mc"
      ? optionsHtml(q.options, { onClick:"playerAnswer" })
      : '<input type="text" id="playerTextInput" placeholder="Type your answer&hellip;"><button class="btn btn-primary" onclick="playerSubmitText()">Submit</button>';
    return '<div class="card">'
      + '<div class="kicker">Question '+(S.currentQ+1)+' of '+QUESTIONS.length+' &middot; '+Math.round(S.durationMs/1000)+'s</div>'
      + '<h2>'+esc(q.q)+'</h2>'
      + '<div class="timerBarWrap"><div class="timerBar'+urgent+'" style="width:'+pct+'%"></div></div>'
      + body
      + '</div>';
  },
  playerAnswered(){
    return '<div class="card center"><h2>Answer locked in \u2705</h2><p class="muted">Waiting for the host to reveal&hellip;</p></div>';
  },
  playerReveal(){
    var last = S.myLast || { correct:false, points:0 };
    var headline = last.correct ? "\uD83C\uDF89 Correct!" : (S.selected===null ? "\u23F1\uFE0F Out of time" : "\u274C Not quite");
    return '<div class="card center">'
      + '<h2>'+headline+'</h2>'
      + '<div class="scoreBig'+(last.correct?" good":"")+'" style="color:'+(last.correct?"var(--good)":"var(--bad)")+'">+'+last.points+'</div>'
      + '<p class="muted">Your total score: <b style="color:var(--text)">'+S.myScore+'</b> &middot; '+S.myCorrectCount+'/'+(S.currentQ+1)+' correct</p>'
      + '</div>';
  },
  playerLeaderboard(){
    return '<div class="card center">'
      + '<div class="kicker">Leaderboard</div>'
      + '<p>Check the big screen for standings!</p>'
      + '<p class="muted">Your score so far</p>'
      + '<div class="scoreBig">'+S.myScore+'</div>'
      + '</div>';
  },
  playerFinal(){
    return '<div class="card center">'
      + '<div class="kicker">Game Over</div>'
      + '<h1>Final Score</h1>'
      + '<div class="scoreBig">'+S.myScore+'</div>'
      + '<p class="muted">'+S.myCorrectCount+' of '+(S.currentQ+1)+' correct</p>'
      + '<p class="muted">See the big screen for the full leaderboard.</p>'
      + '</div>';
  },
  soloQuestion(){
    var q = QUESTIONS[S.solo.idx];
    var elapsed = Date.now()-S.solo.startedAt;
    var remain = Math.max(0, S.durationMs-elapsed);
    var pct = Math.max(0, 100*remain/S.durationMs);
    var body = q.type==="mc"
      ? optionsHtml(q.options, { onClick:"soloAnswer" })
      : '<input type="text" id="soloTextInput" placeholder="Type your answer&hellip;"><button class="btn btn-primary" onclick="soloSubmitText()">Submit</button>';
    return '<div class="card">'
      + '<div class="kicker">Solo Practice &mdash; Question '+(S.solo.idx+1)+' of '+QUESTIONS.length+' &middot; '+Math.round(S.durationMs/1000)+'s &middot; Score '+S.solo.score+'</div>'
      + '<h2>'+esc(q.q)+'</h2>'
      + '<div class="timerBarWrap"><div class="timerBar" style="width:'+pct+'%"></div></div>'
      + body
      + '</div>';
  },
  soloFeedback(){
    var q = QUESTIONS[S.solo.idx];
    var body = q.type==="mc"
      ? optionsHtml(q.options, { correctIdx:q.correct, selected:S.solo.selected })
      : '<p class="muted">You typed: <b style="color:var(--text)">'+esc(S.solo.lastRaw)+'</b></p><p class="muted">Accepted: <b style="color:var(--text)">'+esc(q.accepted.join(", "))+'</b></p>';
    return '<div class="card">'
      + '<h2>'+(S.solo.lastCorrect ? "\uD83C\uDF89 Correct!" : "\u274C Not quite")+'</h2>'
      + body
      + '<p class="muted">Score: <b style="color:var(--text)">'+S.solo.score+'</b> &middot; '+S.solo.correctCount+'/'+(S.solo.idx+1)+' correct</p>'
      + '<button class="btn btn-primary" onclick="soloNext()">'+(S.solo.idx+1>=QUESTIONS.length ? "See results &rarr;" : "Next question &rarr;")+'</button>'
      + '</div>';
  },
  soloFinal(){
    var maxPossible = QUESTIONS.length*1000;
    var pct = maxPossible>0 ? Math.round(100*S.solo.score/maxPossible) : 0;
    var msg = "Nice warm-up \u2014 run it again!";
    if(pct>=90) msg = "\uD83C\uDF1F Certified lighting legend.";
    else if(pct>=70) msg = "\uD83D\uDCA1 Sharp \u2014 you know your stuff.";
    else if(pct>=50) msg = "\uD83D\uDC4D Solid \u2014 a bit more revision helps.";
    return '<div class="card center">'
      + '<div class="kicker">Solo Practice &mdash; Done</div>'
      + '<h1>'+S.solo.score+' pts</h1>'
      + '<p class="muted">'+S.solo.correctCount+' of '+QUESTIONS.length+' correct &middot; '+pct+'% of max possible</p>'
      + '<p>'+msg+'</p>'
      + '<button class="btn btn-primary" onclick="soloStart()">Play again</button>'
      + '<button class="btn btn-ghost" onclick="resetToLanding()">Back to menu</button>'
      + '</div>';
  },
  editList(){
    var rows = QUESTIONS.map(function(q,i){
      var badge = q.type==="text" ? "TEXT" : "MC";
      var secBadge = (q.seconds || QUESTION_SECONDS) + "s";
      return '<div class="qrow">'
        + '<div class="qrow-main"><span class="badge">'+badge+'</span><span class="badge">'+secBadge+'</span>'+esc(q.q)+'</div>'
        + '<div class="qrow-actions">'
        + '<button class="iconbtn" onclick="moveQuestion('+i+',-1)" '+(i===0?"disabled":"")+'>&uarr;</button>'
        + '<button class="iconbtn" onclick="moveQuestion('+i+',1)" '+(i===QUESTIONS.length-1?"disabled":"")+'>&darr;</button>'
        + '<button class="iconbtn" onclick="openEditForm('+i+')">Edit</button>'
        + '<button class="iconbtn danger" id="del-'+i+'" onclick="requestDelete('+i+')">Delete</button>'
        + '</div></div>';
    }).join("");
    return '<div class="card">'
      + '<div class="kicker">Question bank (' + QUESTIONS.length + ')</div>'
      + (rows || '<p class="muted">No questions yet.</p>')
      + '<div style="margin-top:16px;">'
      + '<button class="btn btn-primary" onclick="openEditForm(null)">+ Add question</button>'
      + '<button class="btn btn-ghost" onclick="resetToLanding()">Back</button>'
      + '<button class="btn btn-ghost" id="resetBankBtn" onclick="resetQuestionBank()">Reset to starter set</button>'
      + '</div></div>';
  },
  editForm(){
    var d = S.editDraft;
    var isNew = S.editing===null;
    var optionsHtml2 = "";
    for(var k=0;k<4;k++){
      optionsHtml2 += '<div class="optedit">'
        + '<input type="radio" name="correctopt" '+(d.correct===k?"checked":"")+' onclick="setDraftCorrect('+k+')">'
        + '<input type="text" value="'+esc(d.options[k])+'" oninput="setDraftOption('+k+', this.value)" placeholder="Option '+String.fromCharCode(65+k)+'">'
        + '</div>';
    }
    return '<div class="card">'
      + '<div class="kicker">'+(isNew?"Add question":"Edit question")+'</div>'
      + '<label class="field">QUESTION</label>'
      + '<textarea rows="2" oninput="setDraftQ(this.value)">'+esc(d.q)+'</textarea>'
      + '<label class="field">ANSWER TYPE</label>'
      + '<div class="segrow">'
      + '<div class="seg'+(d.type==="mc"?" active":"")+'" data-type="mc" onclick="setDraftType(this)">Multiple choice</div>'
      + '<div class="seg'+(d.type==="text"?" active":"")+'" data-type="text" onclick="setDraftType(this)">Text answer</div>'
      + '</div>'
      + (d.type==="mc"
          ? '<label class="field">OPTIONS &mdash; tick the correct one</label>' + optionsHtml2
          : '<label class="field">ACCEPTED ANSWERS (comma-separated)</label><input type="text" value="'+esc(d.accepted)+'" oninput="setDraftAccepted(this.value)">'
        )
      + '<label class="field">TIME LIMIT (SECONDS)</label>'
      + '<input type="number" min="3" max="300" step="1" value="'+esc(String(d.seconds))+'" oninput="setDraftSeconds(this.value)">'
      + '<button class="btn btn-primary" onclick="saveDraft()">Save question</button>'
      + '<button class="btn btn-ghost" onclick="cancelEdit()">Cancel</button>'
      + '</div>';
  }
};

function render(){
  var app = document.getElementById("app");
  app.innerHTML = SCREENS[S.screen] ? SCREENS[S.screen]() : SCREENS.landing();
  if(S.screen === "hostLobby" && STORAGE_WORKING !== false){
    renderQrCode(buildJoinUrl(S.code));
  }
}

async function boot(){
  await initQuestions();
  STORAGE_WORKING = supabaseConfigured();
  if(STORAGE_WORKING){
    var probe = await sset("quiz:_capability_test", { t: Date.now() });
    STORAGE_WORKING = (probe !== null);
  }
  var joinCode = getUrlParam("join");
  if(joinCode){
    var saved = getSavedSession(joinCode);
    if(saved && saved.playerId){
      await playerJoin(joinCode, saved.name);
      return;
    }
    S.prefillCode = joinCode;
    S.screen = "joinForm";
  } else {
    S.screen = "landing";
  }
  render();
}
render();
boot();
</script>
</body>
</html>
